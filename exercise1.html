<!DOCTYPE html>
<html>
<head>
    <title>Exercise 1 - Basic Events</title>
</head>
<body onload="pageLoaded()">

<h1>Common Events Demo</h1>

<p id="loadMsg">Waiting for page load...</p>

<input type="text" onchange="inputChanged()" placeholder="Type something">

<br><br>

<button onclick="buttonClicked()">Click Me</button>

<p onmouseover="this.style.color='red'" 
   onmouseout="this.style.color='black'">
   Hover over me!
</p>

<script>
function pageLoaded() {
    document.getElementById("loadMsg").innerHTML =
        "JavaScript onload triggered!";
}

function inputChanged() {
    alert("Input changed!");
}

function buttonClicked() {
    alert("Button clicked!");
}
</script>

</body>
</html>
